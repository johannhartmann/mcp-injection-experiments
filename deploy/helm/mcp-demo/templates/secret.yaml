{{- if not .Values.auth.adminToken -}}
{{- fail "auth.adminToken must be set (publicMode requires a non-default DEMO_ADMIN_TOKEN). Set it via helm.parameters in the ArgoCD Application or --set." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-demo.fullname" . }}-admin
  labels:
    {{- include "mcp-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ .Values.auth.adminToken | quote }}
