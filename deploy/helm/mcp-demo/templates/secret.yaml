{{- if not .Values.auth.adminToken -}}
{{- fail "auth.adminToken must be set (publicMode requires a non-default DEMO_ADMIN_TOKEN). Set it via the SOPS-encrypted values file (deploy/helm/mcp-demo/values.sops.yaml) referenced from the ArgoCD Application's helm.valueFiles." -}}
{{- end -}}
{{- if not .Values.auth.geminiApiKey -}}
{{- fail "auth.geminiApiKey must be set (the agent IS the demo). Set it via the SOPS-encrypted values file (deploy/helm/mcp-demo/values.sops.yaml) referenced from the ArgoCD Application's helm.valueFiles." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-demo.fullname" . }}-admin
  labels:
    {{- include "mcp-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ .Values.auth.adminToken | quote }}
  gemini-api-key: {{ .Values.auth.geminiApiKey | quote }}
