# Default values for the mcp-demo Helm chart.
# Real values for the data-muc cluster live in the matching ArgoCD
# Application under data-muc/demo-apps/mcp-sec.yaml.

image:
  repository: ghcr.io/johannhartmann/mcp-injection-experiments
  tag: main
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: traefik
  host: mcp-sec.data.mayflower.tech
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # data-muc cluster uses DNS-01 via the "letsencrypt-intern-dns"
    # ClusterIssuer (same one argocd.data.mayflower.zone uses). HTTP-01
    # 'letsencrypt' / 'letsencrypt-prod' issuers are not configured.
    cert-manager.io/cluster-issuer: letsencrypt-intern-dns
  tls:
    enabled: true
    secretName: mcp-demo-tls

# Demo runtime configuration. The container's safe defaults
# (DEMO_BIND_HOST=0.0.0.0, DEMO_EGRESS_MODE=deny,
# DEMO_ENABLE_LOCAL_CALC_PROOF=false, DEMO_REPO_ROOT=/app) come from
# the image; we only override what differs in the cluster.
config:
  publicMode: true
  allowedOrigins: "https://mcp-sec.data.mayflower.tech"

# Required runtime credentials. Both gate publicMode startup the same
# way: validate_for_public_mode() refuses to start unless they are set
# to non-default, non-empty values. In Kubernetes the real values are
# fed in via SOPS - see values.sops.yaml in this directory, decrypted
# by the ArgoCD Application's `helm.valueFiles: ["secrets://..."]`.
auth:
  # Admin-token gate for /demo/reset and related admin endpoints.
  adminToken: ""
  # Google AI Studio key consumed as GEMINI_API_KEY. The agent IS the
  # demo; the chart fails fast if this is unset in publicMode.
  geminiApiKey: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod-level hardening; matches docker-compose.yml.
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Probes hit /healthz and /readyz which the app exposes without
# Origin-allowlist enforcement.
probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
  startup:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}
