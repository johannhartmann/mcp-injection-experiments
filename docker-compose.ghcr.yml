services:
  mcp-demo:
    # Pull the prebuilt image from GitHub Container Registry instead of
    # building locally. Override the tag via ``MCP_DEMO_IMAGE_TAG``
    # (default: latest, set by .github/workflows/ci.yml on push to main).
    # Example:
    #   MCP_DEMO_IMAGE_TAG=v1.2.0 docker compose -f docker-compose.ghcr.yml up -d
    image: ghcr.io/johannhartmann/mcp-injection-experiments:${MCP_DEMO_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: mcp-demo
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DEMO_BIND_HOST: "0.0.0.0"
      DEMO_BIND_PORT: "8000"
      DEMO_ALLOWED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"
      DEMO_ADMIN_TOKEN: "${DEMO_ADMIN_TOKEN:-local-dev}"
      DEMO_EGRESS_MODE: "deny"
      DEMO_ENABLE_LOCAL_CALC_PROOF: "false"
    read_only: true
    tmpfs:
      - /app/var
      - /app/sandbox/effects
      - /app/sandbox/allowed
      - /app/sandbox/outside
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;\nimport json;\nresp=urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3);\nbody=json.loads(resp.read());\nsys.exit(0 if body.get('status')=='ok' else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
