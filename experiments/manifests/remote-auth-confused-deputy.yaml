id: remote-auth-confused-deputy
title: Remote Auth Confused Deputy (Fake-OAuth)
owasp:
  - MCP01
  - MCP07
mode_support:
  - vulnerable
  - defended
requires_network: false
uses_real_secrets: false
safe_mode: true
entrypoint: /mcp/auth-confused-deputy
expected_vulnerable_result: fake_crm_change_applied_with_wrong_audience_token
expected_defended_result: token_rejected_with_failed_check_explanation
mitigations:
  - audience_validation
  - expiry_validation
  - scope_subset_check
  - per_client_redirect_consent
references:
  - https://owasp.org/www-project-mcp-top-10/
impact:
  vulnerable:
    type: permission_change_applied
    artifact: var/telemetry.jsonl
    user_visible: fake_crm_record_changed_with_wrong_audience_token
  defended:
    type: blocked_attempt_recorded
    artifact: var/telemetry.jsonl
    user_visible: token_passthrough_blocked_with_failed_check
narrative:
  "vulnerable": "The vulnerable update_profile accepts an OAuth bearer (FAKEJWT) and treats it as authorisation as long as the JWT decodes. It does not check the audience claim, so a token issued for a different service is still applied: the helper acts as a confused deputy on behalf of the wrong principal and the fake CRM mutates with the wrong-aud token."
  "defended": "The wrapper verifies aud (must equal mcp-demo-server), exp (must be in the future), scope (must be a subset of the granted set) and the per-client/per-redirect-uri consent record. Wrong-aud, expired or over-scoped tokens are rejected with the specific failed check named in telemetry."
