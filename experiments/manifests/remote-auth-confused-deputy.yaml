id: remote-auth-confused-deputy
title: Remote Auth Confused Deputy (Fake-OAuth)
owasp:
  - MCP01
  - MCP07
mode_support:
  - vulnerable
  - defended
requires_network: false
uses_real_secrets: false
safe_mode: true
entrypoint: /mcp/auth-confused-deputy
expected_vulnerable_result: fake_crm_change_applied_with_wrong_audience_token
expected_defended_result: token_rejected_with_failed_check_explanation
mitigations:
  - audience_validation
  - expiry_validation
  - scope_subset_check
  - per_client_redirect_consent
references:
  - https://owasp.org/www-project-mcp-top-10/
impact:
  vulnerable:
    type: permission_change_applied
    artifact: var/telemetry.jsonl
    user_visible: fake_crm_record_changed_with_wrong_audience_token
  defended:
    type: blocked_attempt_recorded
    artifact: var/telemetry.jsonl
    user_visible: token_passthrough_blocked_with_failed_check
narrative:
  "vulnerable": "The update_profile tool accepts a FAKEJWT bearer and applies the change\
    \ as long as the token decodes. A token whose audience claim names a different service\
    \ still works - the fake CRM gets mutated by the wrong principal."
  "defended": "The wrapper validates aud, exp, scope subset, and the per-client/per-redirect-uri\
    \ consent record before forwarding the call. Wrong-audience tokens are rejected\
    \ with explicit reasons in telemetry."
