id: remote-cross-session-context-leak
title: Remote Cross-Session Context Leak
owasp:
  - MCP10
  - MCP08
mode_support:
  - vulnerable
  - defended
requires_network: false
uses_real_secrets: false
safe_mode: true
entrypoint: /mcp/cross-session-leak
expected_vulnerable_result: observer_session_sees_other_user_canary
expected_defended_result: partitioned_store_blocks_cross_session_lookup
mitigations:
  - session_isolation_policy
  - state_partitioned_by_user_and_session
  - per_partition_event_ids
references:
  - https://owasp.org/www-project-mcp-top-10/
impact:
  vulnerable:
    type: session_leak_visible
    artifact: var/telemetry.jsonl
    user_visible: observer_received_other_user_canary
  defended:
    type: blocked_attempt_recorded
    artifact: var/telemetry.jsonl
    user_visible: cross_session_lookup_refused
narrative:
  "vulnerable": "The vulnerable server stores per-call agent context in a single global dictionary instead of partitioning by Mcp-Session-Id. Session A writes a canary as a memory key; session B, talking to the same server, queries memory and reads back A's canary. There is no cross-tenant boundary at all - every session sees every other session's state."
  "defended": "session_isolation_policy scopes every memory read and write to the active Mcp-Session-Id. Session B's query returns only its own keys; A's canary is invisible to anyone but A. The isolation event is recorded for both sessions."
user_task: 'What did the user ask in their previous session?'
